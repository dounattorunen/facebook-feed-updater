name: Update Facebook Feed

on:
  schedule:
    # 毎日 日本時間の午前6時 (UTCで前日21:00) に自動実行
    - cron: '0 21 * * *'
  workflow_dispatch: # 管理画面から手動で実行するためのボタン

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # ★ ここ（steps:）のインデントを直しました
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ① 既存のプログラムを実行（一切影響なし）
      - name: Run script
        run: python update_feed.py

      # ② 【新規追加】CSVからPinterest用XMLを生成
      - name: Generate Pinterest XML
        run: python generate_pinterest.py

      # ③ 既存のコミット処理
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add facebook_feed.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Update feed: $(date +'%Y-%m-%d %H:%M:%S')"
          git push

      # ④ 【新規追加】XMLをfutureshopのFTPへ転送
      - name: Upload XML via cURL
        run: |
          curl -T pinterest_feed.xml ftp://${{ secrets.FTP_SERVER }}/public_html/pinterest/pinterest_feed.xml --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
